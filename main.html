<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form method="post">
		<label for="name">Name: </label>
		<input type="text" id="name" placeholder="Name" required>
        <br><br>

		<label for="email">Email: </label>
		<input type="email" id="email" placeholder="Email" required>
        <br><br>
        
        <label for="email">Gender: </label>
		<input type="radio" name="gender" id="gender_m" required>
        <label for="gender_m">Male</label>
		<input type="radio" name="gender" id="gender_f" required>
        <label for="gender_f">Female</label>
        <br><br>

        <label for="cars">Car Brands: </label>
        <select name="cars" id="cars" required>
            <option value="" selected disabled hidden>--Please choose an option--</option>
            <option value="tata">TATA</option>
            <option value="mahindra">Mahindra</option>
            <option value="maruti">Maruti</option>
            <option value="hyundai">Hyundai</option>
        </select>
        <br><br>

        <label for="age">Age: </label>
        <input type="number" id="age" name="age" placeholder="Age" required>
        <br><br>
        
        
        <label for="dob">DOB: </label>
        <input type="date" id="dob" name="dob" required>
        <br><br>


        <label for="tel">Phone Number: </label>
        <input type="tel" id="tel" name="tel" placeholder="xxx-xxx-xxxx" required>
        <br><br>


        <label for="password">Password: </label>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <br><br>


        <input type="checkbox" id="tos" name="tos" required>
        <label for="tos">I agree to the TOS </label>
        <br><br>

        <button type="submit">Submit</button>
	</form>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
